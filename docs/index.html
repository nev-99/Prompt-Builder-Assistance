<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NEV-PROMPTBUILDER - Translate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      /* ===== Base ===== */

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f7f7f8;
        color: #222;
      }

      /* ===== Header ===== */

      header {
        background: white;
        border-bottom: 1px solid #ddd;
      }

      .header-inner {
        max-width: 1100px;
        margin: auto;
        padding: 18px 20px;
        font-weight: bold;
        font-size: 20px;
        letter-spacing: 1px;
      }

      /* ===== Layout ===== */

      .container {
        max-width: 1100px;
        margin: auto;
        padding: 30px 20px;
      }

      .layout {
        display: flex;
        gap: 24px;
      }

      .main {
        flex: 1;
      }

      .sidebar {
        width: 300px;
      }

      /* ===== Cards ===== */

      .card {
        background: white;
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
      }

      /* ===== Headings ===== */

      h2 {
        margin-top: 0;
      }

      h3 {
        margin-top: 0;
      }

      /* ===== Form ===== */

      textarea {
        width: 100%;
        height: 130px;
        margin-bottom: 10px;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        box-sizing: border-box;
      }

      select {
        width: 100%;
        padding: 6px;
        margin-top: 6px;
        margin-bottom: 12px;
      }

      /* ===== Buttons ===== */

      button {
        padding: 8px 14px;
        border: none;
        background: #3a6df0;
        color: white;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
      }

      button:hover {
        background: #2c53c7;
      }

      .button-secondary {
        background: #eee;
        color: #333;
      }

      .button-secondary:hover {
        background: #ddd;
      }

      .button-danger {
        background: #c43;
      }

      .button-danger:hover {
        background: #a22;
      }

      /* ===== Option groups ===== */

      .option-group {
        margin-bottom: 16px;
      }

      .option-group label {
        display: block;
        font-size: 14px;
      }

      /* ===== Prompt List ===== */

      .prompt-item {
        display: flex;
        gap: 8px;
        padding: 10px 6px;
        border-bottom: 1px solid #ddd;
        cursor: pointer;
      }

      .prompt-text {
        flex: 1;
        font-size: 13px;
        line-height: 1.4;
        word-break: break-word;
      }

      .delete-btn {
        color: #900;
        font-weight: bold;
        cursor: pointer;
      }

      /* ===== Result ===== */

      .result-box {
        margin-top: 20px;
        background: #f5f5f5;
        padding: 14px;
        border: 1px solid #ddd;
        border-radius: 8px;
        white-space: pre-wrap;
      }

      /* ===== Responsive ===== */

      @media (max-width: 900px) {
        .layout {
          flex-direction: column;
        }

        .sidebar {
          width: auto;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <div class="header-inner">NEV-PROMPTBUILDER</div>
    </header>

    <div class="container">
      <h2>Translation Prompt Builder</h2>

      <div class="layout">
        <div class="main">
          <!-- Translation Template -->

          <div class="card">
            <h3>
              <label>
                <input type="checkbox" id="enableTranslationTemplate" />
                Use Translation Template
              </label>
            </h3>

            <div id="translationOptions" style="display: none">
              <div class="option-group">
                <strong>Output format</strong>

                <label>
                  <input
                    type="radio"
                    name="outputFormat"
                    value="plain"
                    checked
                  />
                  Plain text
                </label>

                <label>
                  <input type="radio" name="outputFormat" value="markdown" />
                  Markdown
                </label>

                <label>
                  <input type="radio" name="outputFormat" value="codeblock" />
                  Markdown code block
                </label>
              </div>

              <div class="option-group">
                <strong>Target language</strong>

                <select id="targetLanguage">
                  <option value="English">English</option>
                  <option value="Japanese">Japanese</option>
                  <option value="Spanish">Spanish</option>
                </select>
              </div>

              <div class="option-group">
                <strong>Translation style</strong>

                <label>
                  <input type="radio" name="style" value="natural" checked />
                  Natural
                </label>

                <label>
                  <input type="radio" name="style" value="faithful" />
                  Faithful
                </label>
              </div>

              <div class="option-group">
                <strong>Language flavor</strong>

                <label>
                  <input type="checkbox" id="allowSlang" />
                  Allow slang
                </label>

                <label>
                  <input type="checkbox" id="allowAbbrev" />
                  Allow abbreviations
                </label>
              </div>
            </div>
          </div>

          <!-- Base Prompt -->

          <div class="card">
            <h3>Base Prompt</h3>

            <textarea id="basePrompt"></textarea>

            <button id="resetBaseBtn" class="button-secondary">
              Clear Base Prompt
            </button>
          </div>

          <!-- Additional Text -->

          <div class="card">
            <h3>Additional Text</h3>

            <textarea id="addonPrompt"></textarea>

            <button id="resetAddonBtn" class="button-secondary">
              Clear Additional Text
            </button>
          </div>

          <div class="card">
            <button id="resetAllTextBtn" class="button-secondary">
              Clear All Text Fields
            </button>

            <button id="copyBtn">Copy Prompt</button>

            <div id="resultArea" style="display: none">
              <div class="result-box">
                <strong>Copied to clipboard</strong>

                <div id="resultText"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Sidebar -->

        <aside class="sidebar">
          <div class="card">
            <h3>Saved Prompts</h3>

            <button id="exportPromptsBtn" class="button-secondary">
              Export Prompts
            </button>

            <button id="importPromptsBtn" class="button-secondary">
              Import Prompts
            </button>

            <button id="clearPromptsBtn" class="button-danger">
              Clear All Saved Prompts
            </button>

            <div id="promptList"></div>
          </div>
        </aside>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
